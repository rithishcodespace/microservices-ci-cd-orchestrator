name: Run Tests

on:
  push:
    branches:
      - main
    paths:
      - services/**
      - .github/workflows/test.yaml
  pull_request:
  workflow_dispatch:

jobs:

  filter:
    runs-on: ubuntu-24.04
    outputs:
      services: ${{ steps.filter.outputs.changes }} # This jobs output will be named as (changes)
    steps:
      - name: Checkout code # placed before filter, coz filter runs git commands, so without checkout there might not be proper repo metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # checkouts entire repo, all branches, all tags, etc.. (without this the defult would be -> 1 [which checkouts only the latest commits])
        
      - name: filter
        id: filter
        uses: dorny/paths-filter@v3 # It checks which files/folders changed in a commit or PR.
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # for dorny to access gihtub api
          base: main
          filters: .github/utils/file-filters.yaml

  test:
    runs-on: ubuntu-24.04
    needs: filter
    if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != '' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.filter.outputs.services) }} # needs -> output of previous job, filter -> name of job, outputs.services -> output variable of that job

    steps:
      - name: Checkout code # ran twice since both jobs not necessarily run on same runner
        uses: actions/checkout@v3

      - name: Setup Node.js
        if: ${{ startsWith(matrix.service,'services/node/') || startsWith(matrix.service,'services/react/') }}
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Setup Go
        if: ${{ startsWith(matrix.service,'services/go/') }}
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Python
        if: ${{ startsWith(matrix.service,'services/python/') }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'
          cache-dependency-path: ${{ matrix.service }}/poetry.lock

      - name: Install Poetry
        if: ${{ startsWith(matrix.service,'services/python/') }}
        uses: snok/install-poetry@v1

      - name: Install Task CLI
        uses: supplypike/setup-bin@v1
        with:
          uri: https://github.com/go-task/task/releases/download/v3.44.1/task_linux_amd64.tar.gz
          name: task
          version: v3.44.1

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          task install-ci

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          task test